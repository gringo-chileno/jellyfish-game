<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jellyfish Ocean Adventure</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #001220;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    border: 3px solid #0077B6;
    border-radius: 8px;
    width: 99vw;
    height: 99vh;
    object-fit: contain;
  }
  #touch-controls {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    pointer-events: none;
    padding: 10px;
  }
  @media (pointer: coarse) {
    #touch-controls { display: flex; justify-content: space-between; align-items: flex-end; }
    canvas { height: 65vh; width: 99vw; }
  }
  .touch-dpad {
    pointer-events: auto;
    display: grid;
    grid-template-columns: 60px 60px 60px;
    grid-template-rows: 60px 60px 60px;
    gap: 4px;
    margin-left: 10px;
  }
  .touch-btn {
    pointer-events: auto;
    background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 12px;
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .touch-btn:active { background: rgba(255,255,255,0.5); }
  .touch-action {
    pointer-events: auto;
    width: 90px;
    height: 90px;
    background: rgba(0,229,255,0.35);
    border: 2px solid rgba(0,229,255,0.6);
    border-radius: 50%;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    margin-right: 20px;
    margin-bottom: 20px;
  }
  .touch-action:active { background: rgba(0,229,255,0.6); }
  .touch-shield {
    pointer-events: auto;
    width: 70px;
    height: 70px;
    background: rgba(200,100,255,0.35);
    border: 2px solid rgba(200,100,255,0.6);
    border-radius: 50%;
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    margin-right: 20px;
    margin-bottom: 100px;
  }
  .dpad-empty { pointer-events: none; }
  .action-btns { display: flex; flex-direction: column; align-items: flex-end; }
</style>
</head>
<body>
<canvas id="game" width="1000" height="750"></canvas>
<div id="touch-controls">
  <div class="touch-dpad">
    <div class="dpad-empty"></div>
    <div class="touch-btn" data-key="ArrowUp">&#9650;</div>
    <div class="dpad-empty"></div>
    <div class="touch-btn" data-key="ArrowLeft">&#9664;</div>
    <div class="dpad-empty"></div>
    <div class="touch-btn" data-key="ArrowRight">&#9654;</div>
    <div class="dpad-empty"></div>
    <div class="touch-btn" data-key="ArrowDown">&#9660;</div>
    <div class="dpad-empty"></div>
  </div>
  <div class="action-btns">
    <div class="touch-shield" data-key="ShiftLeft">SHIELD</div>
    <div class="touch-action" data-key="Space">PULSE</div>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ============================================================
// GAME STATE
// ============================================================
const keys = {};
let gameState = 'title';
let currentLevel = 0;
let score = 0;
let totalScore = 0;
let levelTimer = 0;
let messageTimer = 0;
let messageText = '';
let highestLevel = 0;
let levelSelectCursor = 0;
let frameCount = 0;
let camX = 0, camY = 0;
let shakeTimer = 0;
let evolveTimer = 0;
let evolveStage = -1;

// Input
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  keys['Space'] = true;
  if (!musicStarted) { musicStarted = true; startMusic(0); }
}, {passive: false});
canvas.addEventListener('touchend', e => { e.preventDefault(); keys['Space'] = false; }, {passive: false});

function setupTouchControls() {
  document.querySelectorAll('[data-key]').forEach(btn => {
    const key = btn.getAttribute('data-key');
    btn.addEventListener('touchstart', e => {
      e.preventDefault(); keys[key] = true;
      if (!musicStarted) { musicStarted = true; startMusic(0); }
    }, {passive: false});
    btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; }, {passive: false});
    btn.addEventListener('touchcancel', () => { keys[key] = false; });
  });
}

// ============================================================
// SAVE SYSTEM
// ============================================================
function saveProgress() {
  localStorage.setItem('jellyfish-save', JSON.stringify({ highestLevel, totalScore }));
}
function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem('jellyfish-save') || '{}');
    highestLevel = d.highestLevel || 0;
    totalScore = d.totalScore || 0;
  } catch(e) { highestLevel = 0; totalScore = 0; }
}
loadProgress();

// ============================================================
// MUSIC - Web Audio API
// ============================================================
let audioCtx = null;
let musicPlaying = false;
let musicNodes = [];
let musicInterval = null;
let currentTrack = -1;
let musicStarted = false;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playNote(freq, startTime, duration, type, vol) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
  musicNodes.push(osc);
}

function playSfx(freq, dur, type, vol) {
  initAudio();
  const t = audioCtx.currentTime;
  playNote(freq, t, dur, type, vol || 0.1);
}

function sfxPulse() { playSfx(400, 0.1, 'triangle', 0.08); playSfx(600, 0.1, 'triangle', 0.06); }
function sfxPearl() { const t = audioCtx.currentTime; playNote(800, t, 0.08, 'sine', 0.08); playNote(1000, t+0.06, 0.08, 'sine', 0.08); playNote(1200, t+0.12, 0.1, 'sine', 0.06); }
function sfxHit() { playSfx(100, 0.3, 'square', 0.1); }
function sfxShield() { const t = audioCtx.currentTime; playNote(500, t, 0.2, 'sine', 0.06); playNote(700, t, 0.2, 'sine', 0.04); playNote(900, t, 0.3, 'sine', 0.03); }
function sfxEvolve() { const t = audioCtx.currentTime; for(let i=0;i<6;i++) playNote(400+i*100, t+i*0.08, 0.2, 'sine', 0.07); }

// Notes
const C4=261.6,D4=293.7,E4=329.6,F4=349.2,G4=392,A4=440,B4=493.9;
const C5=523.3,D5=587.3,E5=659.3,F5=698.5,G5=784;
const C3=130.8,D3=146.8,E3=164.8,F3=174.6,G3=196,A3=220,B3=246.9;
const C2=65.4,D2=73.4,E2=82.4,G2=98;

function scheduleTrack1() {
  const bpm = 120, beat = 60/bpm, now = audioCtx.currentTime + 0.05;
  const melody = [C5,0,E5,0,G4,0,E5,0,C5,0,D5,0,E5,0,C5,0,
                   A4,0,C5,0,E5,0,C5,0,G4,0,A4,0,G4,0,0,0];
  const bass = [C3,C3,C3,C3,E3,E3,E3,E3,F3,F3,F3,F3,G3,G3,G3,G3,
                A3,A3,A3,A3,F3,F3,F3,F3,G3,G3,G3,G3,C3,C3,C3,C3];
  for(let i=0;i<melody.length;i++){
    const t=now+i*beat*0.5;
    if(melody[i]>0)playNote(melody[i],t,beat*0.4,'sine',0.07);
    playNote(bass[i],t,beat*0.45,'triangle',0.1);
  }
  return melody.length*beat*0.5;
}

function scheduleTrack2() {
  const bpm = 90, beat = 60/bpm, now = audioCtx.currentTime + 0.05;
  const melody = [E4,0,0,G4,0,0,A4,0,G4,0,E4,0,D4,0,0,0,
                   C4,0,0,E4,0,0,G4,0,A4,0,G4,0,E4,0,0,0];
  const bass = [A3,0,A3,0,E3,0,E3,0,A3,0,A3,0,E3,0,E3,0,
                C3,0,C3,0,D3,0,D3,0,E3,0,E3,0,A3,0,A3,0];
  for(let i=0;i<melody.length;i++){
    const t=now+i*beat*0.5;
    if(melody[i]>0)playNote(melody[i],t,beat*0.8,'sine',0.06);
    if(bass[i]>0)playNote(bass[i],t,beat*0.7,'triangle',0.1);
  }
  return melody.length*beat*0.5;
}

function scheduleTrack3() {
  const bpm = 140, beat = 60/bpm, now = audioCtx.currentTime + 0.05;
  const melody = [E5,E5,D5,E5,G5,E5,D5,C5,D5,E5,D5,C5,A4,C5,D5,E5,
                   G5,G5,E5,D5,E5,G5,A4,G5,E5,D5,C5,D5,E5,G5,E5,E5];
  const bass = [E2,E2,E2,E2,E2,E2,E2,E2,A3,A3,A3,A3,A3,A3,A3,A3,
                C3,C3,C3,C3,D3,D3,D3,D3,E3,E3,E3,E3,E3,E3,E3,E3];
  for(let i=0;i<melody.length;i++){
    const t=now+i*beat*0.5;
    playNote(melody[i],t,beat*0.25,'sawtooth',0.05);
    playNote(bass[i],t,beat*0.4,'square',0.08);
    if(i%4===0)playNote(40,t,beat*0.1,'triangle',0.12);
  }
  return melody.length*beat*0.5;
}

function startMusic(track) {
  stopMusic(); initAudio();
  musicPlaying = true; currentTrack = track;
  const schedulers = [scheduleTrack1, scheduleTrack2, scheduleTrack3];
  const s = schedulers[track % 3];
  const len = s();
  musicInterval = setInterval(() => {
    musicNodes = musicNodes.filter(n => { try{n.disconnect();}catch(e){} return false; });
    s();
  }, len * 1000 - 100);
}

function stopMusic() {
  musicPlaying = false; currentTrack = -1;
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
  musicNodes.forEach(n => { try{n.stop();n.disconnect();}catch(e){} });
  musicNodes = [];
}

document.addEventListener('keydown', function() {
  if (!musicStarted) { musicStarted = true; startMusic(0); }
});
setupTouchControls();

// ============================================================
// JELLYFISH EVOLUTION DATA
// ============================================================
const evolutions = [
  { name:'Baby Jelly', radius:14, tentacles:2, color:'#80D8FF', glow:'#40C4FF', glowSize:4, speedMult:1.0, pulseCooldown:90, shieldUnlocked:false, canZap:false, maxHits:1 },
  { name:'Young Jelly', radius:18, tentacles:4, color:'#00E5FF', glow:'#00B8D4', glowSize:6, speedMult:1.15, pulseCooldown:90, shieldUnlocked:false, canZap:false, maxHits:1 },
  { name:'Adult Jelly', radius:22, tentacles:6, color:'#E040FB', glow:'#AA00FF', glowSize:8, speedMult:1.2, pulseCooldown:90, shieldUnlocked:true, canZap:false, maxHits:1 },
  { name:'Elder Jelly', radius:26, tentacles:8, color:'#7C4DFF', glow:'#6200EA', glowSize:10, speedMult:1.3, pulseCooldown:60, shieldUnlocked:true, canZap:false, maxHits:1 },
  { name:'Ancient Jelly', radius:30, tentacles:10, color:'#FF80AB', glow:'#FF4081', glowSize:14, speedMult:1.4, pulseCooldown:60, shieldUnlocked:true, canZap:true, maxHits:1 },
  { name:'Immortal Jelly', radius:34, tentacles:12, color:'#FFFFFF', glow:'#E040FB', glowSize:18, speedMult:1.5, pulseCooldown:45, shieldUnlocked:true, canZap:true, maxHits:2 },
];

function getEvolutionStage(level) {
  if (level < 5) return 0;
  if (level < 10) return 1;
  if (level < 15) return 2;
  if (level < 20) return 3;
  if (level < 25) return 4;
  return 5;
}

function getTier(level) {
  if (level < 6) return 0;
  if (level < 12) return 1;
  if (level < 18) return 2;
  if (level < 24) return 3;
  return 4;
}

const tierNames = ['Shallow Reef','Open Ocean','Twilight Zone','Deep Sea','The Abyss'];
const tierBgTop = ['#0077B6','#023E8A','#03045E','#1B0A3C','#0A0612'];
const tierBgBot = ['#023E8A','#03045E','#1B0A3C','#0A0612','#000005'];

// ============================================================
// JELLYFISH CHARACTER
// ============================================================
const jelly = {
  x: 100, y: 375, vx: 0, vy: 0,
  speed: 3.0,
  facing: 1,
  pulseCooldown: 0,
  shieldCooldown: 0,
  shieldActive: false,
  shieldTimer: 0,
  hits: 0,
  stunTimer: 0,
  invincTimer: 0,

  reset(x, y) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.pulseCooldown = 0;
    this.shieldCooldown = 0;
    this.shieldActive = false;
    this.shieldTimer = 0;
    this.hits = 0;
    this.stunTimer = 0;
    this.invincTimer = 0;
  },

  getEvo() { return evolutions[getEvolutionStage(currentLevel)]; },

  update() {
    if (this.stunTimer > 0) { this.stunTimer--; this.vx *= 0.9; this.vy *= 0.9; return; }
    const evo = this.getEvo();
    const spd = this.speed * evo.speedMult;

    if (keys['ArrowLeft'] || keys['KeyA']) { this.vx -= spd * 0.15; this.facing = -1; }
    if (keys['ArrowRight'] || keys['KeyD']) { this.vx += spd * 0.15; this.facing = 1; }
    if (keys['ArrowUp'] || keys['KeyW']) this.vy -= spd * 0.15;
    if (keys['ArrowDown'] || keys['KeyS']) this.vy += spd * 0.15;

    // Pulse boost
    if ((keys['Space']) && this.pulseCooldown <= 0) {
      this.vx += this.facing * spd * 3;
      this.pulseCooldown = evo.pulseCooldown;
      if (audioCtx) sfxPulse();
      if (evo.canZap) this.zapNearby();
    }
    if (this.pulseCooldown > 0) this.pulseCooldown--;

    // Shield
    if ((keys['ShiftLeft'] || keys['ShiftRight']) && evo.shieldUnlocked && this.shieldCooldown <= 0 && !this.shieldActive) {
      this.shieldActive = true;
      this.shieldTimer = 60;
      if (audioCtx) sfxShield();
    }
    if (this.shieldActive) {
      this.shieldTimer--;
      if (this.shieldTimer <= 0) {
        this.shieldActive = false;
        this.shieldCooldown = 600;
      }
    }
    if (this.shieldCooldown > 0) this.shieldCooldown--;
    if (this.invincTimer > 0) this.invincTimer--;

    // Sink force — constant downward pull toward sea floor
    this.vy += 0.06;

    // Drag
    this.vx *= 0.96;
    this.vy *= 0.96;

    // Clamp speed
    const maxSpd = spd * 3.5;
    this.vx = Math.max(-maxSpd, Math.min(maxSpd, this.vx));
    this.vy = Math.max(-maxSpd, Math.min(maxSpd, this.vy));

    this.x += this.vx;
    this.y += this.vy;

    // Bounds
    const r = evo.radius;
    if (this.y < r) { this.y = r; this.vy = 0; }
    if (this.x < r) { this.x = r; this.vx = 0; }
    // Right edge - can't go past exit
    if (currentLevelData && this.x > currentLevelData.worldWidth - r) {
      this.x = currentLevelData.worldWidth - r; this.vx = 0;
    }
    // Sea floor = death
    if (this.y > H - 25) {
      this.y = H - 25;
      this.vy = 0;
      if (this.takeDamage()) {
        gameState = 'gameOver'; levelTimer = 0;
      }
    }
  },

  zapNearby() {
    if (!currentLevelData) return;
    currentLevelData.obstacles.forEach(o => {
      if (o.dead) return;
      const dx = (o.x || 0) - this.x, dy = (o.y || 0) - this.y;
      if (Math.sqrt(dx*dx+dy*dy) < 120) o.stunTimer = 60;
    });
  },

  takeDamage() {
    if (this.invincTimer > 0) return false;
    if (this.shieldActive) {
      this.shieldActive = false;
      this.shieldCooldown = 600;
      this.invincTimer = 30;
      shakeTimer = 10;
      return false;
    }
    const evo = this.getEvo();
    this.hits++;
    this.invincTimer = 60;
    shakeTimer = 15;
    if (audioCtx) sfxHit();
    if (this.hits >= evo.maxHits) return true;
    return false;
  }
};

// ============================================================
// DRAW JELLYFISH
// ============================================================
function drawJellyfish(x, y, evo, facing, frame) {
  const r = evo.radius;
  const t = frame * 0.05;

  ctx.save();
  ctx.translate(x, y);

  // Glow
  ctx.shadowBlur = evo.glowSize;
  ctx.shadowColor = evo.glow;

  // Bell
  ctx.beginPath();
  ctx.ellipse(0, -r*0.2, r, r*0.75, 0, Math.PI, 0);
  ctx.fillStyle = evo.color;
  ctx.globalAlpha = 0.7;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Inner bell highlight
  ctx.beginPath();
  ctx.ellipse(0, -r*0.3, r*0.5, r*0.4, 0, Math.PI, 0);
  ctx.fillStyle = '#ffffff';
  ctx.globalAlpha = 0.15;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Bell rim
  ctx.beginPath();
  ctx.ellipse(0, -r*0.2, r, r*0.15, 0, 0, Math.PI);
  ctx.fillStyle = evo.color;
  ctx.globalAlpha = 0.5;
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.shadowBlur = 0;

  // Tentacles
  for (let i = 0; i < evo.tentacles; i++) {
    const spread = (i / (evo.tentacles - 1 || 1)) * 2 - 1;
    const baseX = spread * r * 0.8;
    const len = r * 1.5 + Math.sin(t + i * 1.3) * r * 0.3;

    ctx.beginPath();
    ctx.moveTo(baseX, -r * 0.1);
    ctx.bezierCurveTo(
      baseX + Math.sin(t + i) * r * 0.4, len * 0.4,
      baseX + Math.sin(t * 0.7 + i * 0.8) * r * 0.5, len * 0.7,
      baseX + Math.sin(t * 1.2 + i * 0.6) * r * 0.3, len
    );
    ctx.strokeStyle = evo.color;
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ============================================================
// LEVEL DEFINITIONS
// ============================================================
let currentLevelData = null;

const levelDefs = [
  // TIER 1: Shallow Reef (0-5)
  { name:'Coral Maze', worldWidth:4000,
    makeObstacles() {
      const obs = [];
      for (let i=0;i<16;i++) {
        obs.push({ type:'coral', x:300+i*220, y:100+Math.sin(i*1.2)*220, w:45+Math.random()*35, h:100+Math.random()*120 });
      }
      return obs;
    }
  },
  { name:'Sea Grass Forest', worldWidth:4000,
    makeObstacles() {
      const obs = [];
      for (let i=0;i<25;i++) {
        obs.push({ type:'seagrass', x:300+i*140, y:H-20, h:200+Math.random()*280 });
      }
      // Add some coral obstacles in the upper area
      for (let i=0;i<6;i++) {
        obs.push({ type:'coral', x:500+i*550, y:80+Math.random()*150, w:35, h:60+Math.random()*60 });
      }
      return obs;
    }
  },
  { name:'Drifting Jellyfish', worldWidth:4500,
    makeObstacles() {
      const obs = [];
      for (let i=0;i<16;i++) {
        obs.push({ type:'enemyjelly', x:350+i*240, y:100+Math.random()*400, vy:(Math.random()-0.5)*2, range:90 });
      }
      return obs;
    }
  },
  { name:'Crab Sentries', worldWidth:4000,
    makeObstacles() {
      const obs = [];
      // Bottom crabs
      for (let i=0;i<8;i++) {
        obs.push({ type:'crab', x:400+i*350, y:H-60, dir:1, speed:2, range:140 });
      }
      // Mid-level coral to force you lower
      for (let i=0;i<10;i++) {
        obs.push({ type:'coral', x:350+i*350, y:50+Math.random()*200, w:50, h:180+Math.random()*100 });
      }
      return obs;
    }
  },
  { name:'Clam Snap', worldWidth:4500,
    makeObstacles() {
      const obs = [];
      for (let i=0;i<14;i++) {
        obs.push({ type:'clam', x:350+i*280, y:150+Math.random()*380, timer:Math.floor(Math.random()*60), period:90+Math.random()*50, open:true });
      }
      // Coral to narrow paths
      for (let i=0;i<5;i++) {
        obs.push({ type:'coral', x:500+i*700, y:80+Math.random()*100, w:40, h:120 });
      }
      return obs;
    }
  },
  { name:'Bubble Curtain', worldWidth:4500,
    makeObstacles() {
      const obs = [];
      for (let i=0;i<10;i++) {
        obs.push({ type:'bubblecurtain', x:400+i*370, w:100, force:-2.0 });
      }
      // Coral ceilings to make the upward push dangerous
      for (let i=0;i<8;i++) {
        obs.push({ type:'coral', x:450+i*480, y:40+Math.random()*80, w:60, h:80 });
      }
      return obs;
    }
  },
  // TIER 2: Open Ocean (6-11)
  { name:'Riptide Channels', worldWidth:5000,
    makeObstacles() {
      const obs = [];
      for (let i=0;i<8;i++) {

// ============================================================
// LOAD LEVEL
// ============================================================
function loadLevel(n) {
  currentLevel = n;
  const def = levelDefs[n];
  const obstacles = def.makeObstacles();
  const pearls = [];
  for (let i = 0; i < 15; i++) {
    pearls.push({ x: 200 + Math.random() * (def.worldWidth - 400), y: 50 + Math.random() * (H - 100), collected: false });
  }
  currentLevelData = {
    name: def.name,
    worldWidth: def.worldWidth,
    obstacles,
    pearls,
    exitX: def.worldWidth - 100,
    exitY: H / 2,
  };
  jelly.reset(80, H / 2);
  camX = 0; camY = 0;

  const tier = getTier(n);
  if (musicStarted) {
    const wantTrack = tier <= 1 ? 0 : tier <= 3 ? 1 : 2;
    if (currentTrack !== wantTrack) startMusic(wantTrack);
  }
}

// ============================================================
// OBSTACLE UPDATE & DRAW
// ============================================================
function updateObstacle(o) {
  if (o.stunTimer > 0) { o.stunTimer--; return; }
  const f = frameCount;
  switch(o.type) {
    case 'enemyjelly':
      o.origY = o.origY || o.y;
      o.y = o.origY + Math.sin(f * 0.03 + o.x) * o.range;
      break;
    case 'crab':
      o.origX = o.origX || o.x;
      o.x += o.speed * o.dir;
      if (Math.abs(o.x - o.origX) > o.range) o.dir *= -1;
      break;
    case 'clam':
      o.timer++;
      if (o.timer >= o.period) { o.open = !o.open; o.timer = 0; }
      break;
    case 'puffer':
      o.timer++;
      if (o.timer >= o.period) { o.inflated = !o.inflated; o.timer = 0; }
      break;
    case 'barracuda':
      o.origX = o.origX || o.x;
      o.x += o.speed * o.dir;
      if (Math.abs(o.x - o.origX) > 400) {
        o.dir *= -1;
      }
      break;
    case 'whirlpool':
      // Pull jelly toward center
      const wdx = o.x - jelly.x, wdy = o.y - jelly.y;
      const wdist = Math.sqrt(wdx*wdx + wdy*wdy);
      if (wdist < o.radius && wdist > 0) {
        const pull = o.strength * (1 - wdist / o.radius) / wdist;
        jelly.vx += wdx * pull * 0.05;
        jelly.vy += wdy * pull * 0.05;
      }
      break;
    case 'turtle':
      o.origX = o.origX || o.x;
      o.x += o.speed * o.dir;
      if (Math.abs(o.x - o.origX) > 300) o.dir *= -1;
      break;
    case 'squid':
      o.inkTimer++;
      if (o.inkTimer >= o.inkPeriod) {
        o.inkTimer = 0;
        o.inkClouds.push({ x: o.x, y: o.y, life: 180, radius: 80 });
      }
      o.inkClouds = o.inkClouds.filter(c => { c.life--; return c.life > 0; });
      break;
    case 'pressurewave':
      o.waveRadius += o.speed;
      if (o.waveRadius > o.maxRadius) o.waveRadius = 0;
      break;
    case 'moray':
      o.lungeTimer++;
      if (!o.lunging && o.lungeTimer >= o.lungePeriod) {
        o.lunging = true; o.lungeTimer = 0; o.lungeY = 0;
      }
      if (o.lunging) {
        o.lungeY += 4;
        if (o.lungeY > 250) { o.lunging = false; o.lungeTimer = 0; o.lungeY = 0; }
      }
      break;
    case 'debris':
      o.y += o.fallSpeed;
      if (o.y > H + 50) o.y = o.respawnY;
      break;
    case 'tentaclesweep':
      o.angle += o.sweepSpeed;
      break;
    case 'vent':
      o.timer++;
      if (!o.active && o.timer >= o.period) { o.active = true; o.timer = 0; }
      if (o.active && o.timer >= o.activeTime) { o.active = false; o.timer = 0; }
      break;
    case 'mine':
      o.origY = o.origY || o.y;
      o.y = o.origY + Math.sin(f * 0.02 + o.bobPhase) * 20;
      break;
    case 'lanternfish':
      o.changeTimer--;
      if (o.changeTimer <= 0) {
        o.vx = (Math.random()-0.5)*4;
        o.vy = (Math.random()-0.5)*4;
        o.changeTimer = 40+Math.random()*60;
      }
      o.x += o.vx; o.y += o.vy;
      if (o.y < 30 || o.y > H-30) o.vy *= -1;
      // Drift back toward home X
      if (o.homeX !== undefined) {
        const drift = (o.homeX - o.x) * 0.003;
        o.vx += drift;
      }
      break;
    case 'searchlight':
      o.angle = -Math.PI/2 + Math.sin(f * o.sweepSpeed) * o.sweepRange;
      break;
    case 'leviathan':
      o.speed += (o.accel || 0.002);
      o.x += o.speed;
      if (jelly.x - o.x < 150) {
        if (jelly.takeDamage()) { gameState = 'gameOver'; levelTimer = 0; }
      }
      break;
    case 'current':
      if (jelly.x > o.x && jelly.x < o.x+o.w && jelly.y > o.y && jelly.y < o.y+o.h) {
        jelly.vx += (o.forceX || 0) * 0.08;
        jelly.vy += (o.forceY || 0) * 0.08;
      }
      break;
    case 'bubblecurtain':
      if (jelly.x > o.x - o.w && jelly.x < o.x + o.w) {
        jelly.vy += o.force * 0.06;
      }
      break;
    case 'icecrystal': break;
    case 'freezezone':
      if (jelly.x > o.x && jelly.x < o.x+o.w && jelly.y > o.y && jelly.y < o.y+o.h) {
        jelly.vx *= o.slowFactor;
        jelly.vy *= o.slowFactor;
      }
      break;
  }
}

function drawObstacle(o) {
  const f = frameCount;
  ctx.save();
  switch(o.type) {
    case 'coral':
      ctx.fillStyle = '#FF6B35';
      ctx.beginPath();
      ctx.roundRect(o.x - o.w/2, o.y - o.h/2, o.w, o.h, 8);
      ctx.fill();
      ctx.fillStyle = '#FF8A5C';
      ctx.beginPath();
      ctx.roundRect(o.x - o.w/4, o.y - o.h/2 + 5, o.w/2, o.h - 10, 6);
      ctx.fill();
      break;
    case 'seagrass':
      for (let s = 0; s < 5; s++) {
        ctx.beginPath();
        const bx = o.x - 15 + s * 8;
        const sway = Math.sin(f * 0.03 + s + o.x * 0.01) * 15;
        ctx.moveTo(bx, o.y);
        ctx.quadraticCurveTo(bx + sway, o.y - o.h * 0.5, bx + sway * 1.5, o.y - o.h);
        ctx.strokeStyle = '#2E7D32';
        ctx.lineWidth = 4;
        ctx.stroke();
      }
      break;
    case 'enemyjelly':
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#FF6090';
      ctx.beginPath();
      ctx.ellipse(o.x, o.y, 15, 12, 0, Math.PI, 0);
      ctx.fill();
      for (let t=0;t<3;t++) {
        ctx.beginPath();
        ctx.moveTo(o.x-8+t*8, o.y);
        ctx.lineTo(o.x-8+t*8+Math.sin(f*0.05+t)*5, o.y+20);
        ctx.strokeStyle='#FF6090';
        ctx.lineWidth=1.5;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      break;
    case 'crab':
      ctx.fillStyle = '#E53935';
      ctx.beginPath();
      ctx.ellipse(o.x, o.y, 18, 12, 0, 0, Math.PI*2);
      ctx.fill();
      // Claws
      ctx.fillStyle = '#C62828';
      ctx.beginPath();
      ctx.arc(o.x-20, o.y-5, 7, 0, Math.PI*2);
      ctx.arc(o.x+20, o.y-5, 7, 0, Math.PI*2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(o.x-6, o.y-8, 3, 0, Math.PI*2);
      ctx.arc(o.x+6, o.y-8, 3, 0, Math.PI*2);
      ctx.fill();
      break;
    case 'clam':
      ctx.fillStyle = o.open ? '#8D6E63' : '#5D4037';
      ctx.beginPath();
      if (o.open) {
        ctx.ellipse(o.x, o.y-8, 25, 15, 0, Math.PI, 0);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(o.x, o.y+8, 25, 15, 0, 0, Math.PI);
        ctx.fill();
      } else {
        ctx.ellipse(o.x, o.y, 25, 8, 0, 0, Math.PI*2);
        ctx.fill();
      }
      if (o.open) {
        ctx.fillStyle = '#FFF8E1';
        ctx.beginPath();
        ctx.arc(o.x, o.y, 5, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    case 'bubblecurtain':
      ctx.globalAlpha = 0.3;
      for (let b=0;b<15;b++) {
        const bx = o.x + Math.sin(f*0.05+b)*o.w/2;
        const by = H - ((f*2+b*50) % H);
        ctx.beginPath();
        ctx.arc(bx, by, 4+Math.random()*4, 0, Math.PI*2);
        ctx.fillStyle = '#B3E5FC';
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;
    case 'current':
      ctx.globalAlpha = 0.1;
      ctx.fillStyle = o.forceX > 0 ? '#4FC3F7' : '#29B6F6';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      // Arrows
      ctx.globalAlpha = 0.25;
      for (let a=0;a<5;a++) {
        const ax = o.x + ((f*2+a*40) % o.w);
        const ay = o.y + a * (o.h/5) + 50;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        if (o.forceX > 0) {
          ctx.moveTo(ax, ay-5); ctx.lineTo(ax+10, ay); ctx.lineTo(ax, ay+5);
        } else {
          ctx.moveTo(ax+10, ay-5); ctx.lineTo(ax, ay); ctx.lineTo(ax+10, ay+5);
        }
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;
    case 'puffer':
      const pr = o.inflated ? o.baseR * 2.2 : o.baseR;
      ctx.fillStyle = o.inflated ? '#FFEB3B' : '#FFC107';
      ctx.beginPath();
      ctx.arc(o.x, o.y, pr, 0, Math.PI*2);
      ctx.fill();
      if (o.inflated) {
        for (let s=0;s<8;s++) {
          const sa = s * Math.PI/4;
          ctx.beginPath();
          ctx.moveTo(o.x+Math.cos(sa)*pr, o.y+Math.sin(sa)*pr);
          ctx.lineTo(o.x+Math.cos(sa)*(pr+8), o.y+Math.sin(sa)*(pr+8));
          ctx.strokeStyle='#F57F17';
          ctx.lineWidth=2;
          ctx.stroke();
        }
      }
      ctx.fillStyle='#000';
      ctx.beginPath();
      ctx.arc(o.x-5,o.y-3,2,0,Math.PI*2);
      ctx.arc(o.x+5,o.y-3,2,0,Math.PI*2);
      ctx.fill();
      break;
    case 'barracuda':
      ctx.fillStyle = '#78909C';
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.scale(o.dir, 1);
      ctx.beginPath();
      ctx.moveTo(-25, 0);
      ctx.lineTo(25, -6);
      ctx.lineTo(25, 6);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle='#B0BEC5';
      ctx.fillRect(-5, -3, 10, 6);
      ctx.fillStyle='#FF5252';
      ctx.beginPath();
      ctx.arc(20, -2, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
      break;
    case 'net':
      ctx.strokeStyle = '#8D6E63';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.6;
      for (let ny=0; ny<H; ny+=20) {
        if (ny > o.gapY && ny < o.gapY + o.gapH) continue;
        ctx.beginPath();
        ctx.moveTo(o.x, ny);
        ctx.lineTo(o.x+40, ny+10);
        ctx.lineTo(o.x, ny+20);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      break;
    case 'whirlpool':
      ctx.globalAlpha = 0.2;
      for (let r=0;r<4;r++) {
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.radius*(r+1)/4, f*0.05+r, f*0.05+r+Math.PI*1.5);
        ctx.strokeStyle = '#4FC3F7';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      break;
    case 'turtle':
      ctx.fillStyle = '#2E7D32';
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.scale(o.dir, 1);
      // Shell
      ctx.beginPath();
      ctx.ellipse(0, 0, o.w/2, o.h/2, 0, 0, Math.PI*2);
      ctx.fill();
      // Head
      ctx.fillStyle = '#4CAF50';
      ctx.beginPath();
      ctx.arc(o.w/2+8, 0, 8, 0, Math.PI*2);
      ctx.fill();
      // Flippers
      ctx.fillStyle = '#388E3C';
      const flapAngle = Math.sin(f*0.08)*0.3;
      ctx.beginPath();
      ctx.ellipse(-5, -o.h/2-5, 15, 6, flapAngle, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(-5, o.h/2+5, 15, 6, -flapAngle, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
      break;
    case 'squid':
      ctx.fillStyle = '#7B1FA2';
      ctx.beginPath();
      ctx.ellipse(o.x, o.y, 12, 20, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#CE93D8';
      ctx.beginPath();
      ctx.arc(o.x-4, o.y-5, 3, 0, Math.PI*2);
      ctx.arc(o.x+4, o.y-5, 3, 0, Math.PI*2);
      ctx.fill();
      // Ink clouds
      o.inkClouds.forEach(c => {
        ctx.globalAlpha = c.life / 180 * 0.7;
        ctx.fillStyle = '#1A0A2E';
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.radius, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
      break;
    case 'angler':
      // Dark body
      ctx.fillStyle = '#1B0A3C';
      ctx.beginPath();
      ctx.ellipse(o.x, o.y, 25, 18, 0, 0, Math.PI*2);
      ctx.fill();
      // Jaw
      ctx.fillStyle = '#0D0520';
      ctx.beginPath();
      ctx.arc(o.x+15, o.y+5, 12, 0, Math.PI);
      ctx.fill();
      // Teeth
      ctx.fillStyle = '#fff';
      for(let t=0;t<4;t++){
        ctx.beginPath();
        ctx.moveTo(o.x+8+t*5,o.y+5);
        ctx.lineTo(o.x+10+t*5,o.y+12);
        ctx.lineTo(o.x+12+t*5,o.y+5);
        ctx.fill();
      }
      // Lure (dangerous glow)
      const lx = o.x - 10 + Math.sin(f*0.04)*5;
      const ly = o.y - 30 + Math.cos(f*0.03)*3;
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#FFFF00';
      ctx.fillStyle = '#FFFF00';
      ctx.beginPath();
      ctx.arc(lx, ly, 5, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // Stalk
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(o.x-5, o.y-15);
      ctx.quadraticCurveTo(o.x-12, o.y-25, lx, ly);
      ctx.stroke();
      o.lureX = lx; o.lureY = ly;
      break;
    case 'pressurewave':
      ctx.globalAlpha = 0.4 * (1 - o.waveRadius / o.maxRadius);
      ctx.beginPath();
      ctx.arc(o.x, o.y, o.waveRadius, 0, Math.PI*2);
      ctx.strokeStyle = '#4FC3F7';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.globalAlpha = 1;
      // Source
      ctx.fillStyle = '#B3E5FC';
      ctx.beginPath();
      ctx.arc(o.x, o.y, 5, 0, Math.PI*2);
      ctx.fill();
      break;
    case 'moray':
      const my = o.side === 'top' ? o.lungeY : H - o.lungeY;
      ctx.fillStyle = '#4E342E';
      ctx.beginPath();
      if (o.side === 'top') {
        ctx.ellipse(o.x, my-10, 12, 40+o.lungeY, 0, 0, Math.PI*2);
      } else {
        ctx.ellipse(o.x, my+10, 12, 40+o.lungeY, 0, 0, Math.PI*2);
      }
      ctx.fill();
      // Head
      ctx.fillStyle = '#3E2723';
      const headY = o.side === 'top' ? my + 30 + o.lungeY : my - 30 - o.lungeY;
      ctx.beginPath();
      ctx.arc(o.x, headY, 10, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle='#FF5252';
      ctx.beginPath();
      ctx.arc(o.x-3, headY-3, 2, 0, Math.PI*2);
      ctx.arc(o.x+3, headY-3, 2, 0, Math.PI*2);
      ctx.fill();
      break;
    case 'debris':
      ctx.fillStyle = '#795548';
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.rotate(f * 0.02 + o.x);
      ctx.fillRect(-o.w/2, -o.h/2, o.w, o.h);
      ctx.restore();
      break;
    case 'darkwall':
      ctx.fillStyle = '#0A0612';
      ctx.fillRect(o.x - o.w/2, o.y - o.h/2, o.w, o.h);
      break;
    case 'biolum':
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#00E5FF';
      ctx.globalAlpha = 0.15 + Math.sin(f*0.03+o.x)*0.1;
      ctx.fillStyle = '#00E5FF';
      ctx.beginPath();
      ctx.arc(o.x, o.y, o.radius, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      break;
    case 'tentaclesweep':
      ctx.strokeStyle = '#4E342E';
      ctx.lineWidth = 8;
      ctx.globalAlpha = 0.7;
      const tx = o.x + Math.cos(o.angle) * o.length;
      const ty = o.y + Math.sin(o.angle) * o.length;
      ctx.beginPath();
      ctx.moveTo(o.x, o.y);
      const mx = (o.x+tx)/2 + Math.sin(f*0.04)*30;
      const my2 = (o.y+ty)/2 + Math.cos(f*0.04)*30;
      ctx.quadraticCurveTo(mx, my2, tx, ty);
      ctx.stroke();
      // Suckers
      for (let s=0;s<5;s++) {
        const st = s/5;
        const sx2 = o.x*(1-st)+tx*st + Math.sin(f*0.04+s)*10;
        const sy2 = o.y*(1-st)+ty*st + Math.cos(f*0.04+s)*10;
        ctx.fillStyle = '#6D4C41';
        ctx.beginPath();
        ctx.arc(sx2, sy2, 4, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;
    case 'vent':
      // Base
      ctx.fillStyle = '#5D4037';
      ctx.beginPath();
      ctx.moveTo(o.x-25, H);
      ctx.lineTo(o.x-15, H-40);
      ctx.lineTo(o.x+15, H-40);
      ctx.lineTo(o.x+25, H);
      ctx.fill();
      if (o.active) {
        ctx.globalAlpha = 0.4;
        for (let v=0;v<10;v++) {
          const vy2 = H - 40 - v*60 - (f*3 % 60);
          ctx.fillStyle = v<3 ? '#FF6D00' : '#FFAB40';
          ctx.beginPath();
          ctx.arc(o.x + Math.sin(f*0.1+v)*10, vy2, 8-v*0.5, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
      break;
    case 'mine':
      ctx.fillStyle = '#455A64';
      ctx.beginPath();
      ctx.arc(o.x, o.y, 15, 0, Math.PI*2);
      ctx.fill();
      // Spikes
      for(let s=0;s<8;s++){
        const sa=s*Math.PI/4;
        ctx.beginPath();
        ctx.moveTo(o.x+Math.cos(sa)*15,o.y+Math.sin(sa)*15);
        ctx.lineTo(o.x+Math.cos(sa)*22,o.y+Math.sin(sa)*22);
        ctx.strokeStyle='#37474F';
        ctx.lineWidth=3;
        ctx.stroke();
      }
      // Blinker
      ctx.fillStyle = f%60<30?'#FF1744':'#455A64';
      ctx.beginPath();
      ctx.arc(o.x,o.y,4,0,Math.PI*2);
      ctx.fill();
      break;
    case 'lanternfish':
      ctx.fillStyle = '#546E7A';
      ctx.beginPath();
      ctx.ellipse(o.x, o.y, 10, 6, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#80DEEA';
      ctx.fillStyle = '#80DEEA';
      ctx.beginPath();
      ctx.arc(o.x+8, o.y-2, 3, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      break;
    case 'searchlight':
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.rotate(o.angle);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(400, -30);
      ctx.lineTo(400, 30);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,200,0.08)';
      ctx.fill();
      ctx.restore();
      break;
    case 'leviathan':
      ctx.fillStyle = '#1A237E';
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.ellipse(o.x, H/2, 200, 300, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#FF1744';
      ctx.beginPath();
      ctx.arc(o.x+150, H/2-50, 15, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'icecrystal':
      ctx.fillStyle = '#B3E5FC';
      ctx.globalAlpha = 0.7;
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.rotate(Math.PI/6);
      ctx.fillRect(-o.size/2, -o.size/4, o.size, o.size/2);
      ctx.rotate(Math.PI/3);
      ctx.fillRect(-o.size/2, -o.size/4, o.size, o.size/2);
      ctx.restore();
      ctx.globalAlpha = 1;
      break;
    case 'freezezone':
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#E1F5FE';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.globalAlpha = 1;
      break;
  }
  ctx.restore();
}

function checkCollision(o) {
  const evo = jelly.getEvo();
  const r = evo.radius;
  const jx = jelly.x, jy = jelly.y;

  switch(o.type) {
    case 'coral': case 'darkwall':
      return jx+r > o.x-o.w/2 && jx-r < o.x+o.w/2 && jy+r > o.y-o.h/2 && jy-r < o.y+o.h/2;
    case 'seagrass':
      if (jx > o.x-15 && jx < o.x+15 && jy > o.y-o.h && jy < o.y) {
        jelly.vx *= 0.92; jelly.vy *= 0.92;
      }
      return false;
    case 'enemyjelly':
      return dist(jx,jy,o.x,o.y) < r + 15;
    case 'crab':
      return dist(jx,jy,o.x,o.y) < r + 18;
    case 'clam':
      if (!o.open) return dist(jx,jy,o.x,o.y) < r + 25;
      return false;
    case 'puffer':
      const pr = o.inflated ? o.baseR*2.2 : o.baseR;
      return dist(jx,jy,o.x,o.y) < r + pr;
    case 'barracuda':
      return jx+r>o.x-25 && jx-r<o.x+25 && jy+r>o.y-6 && jy-r<o.y+6;
    case 'net':
      if (jx > o.x-5 && jx < o.x+45) {
        if (jy < o.gapY || jy > o.gapY + o.gapH) return true;
      }
      return false;
    case 'whirlpool':
      return dist(jx,jy,o.x,o.y) < 20;
    case 'turtle':
      return jx+r>o.x-o.w/2 && jx-r<o.x+o.w/2 && jy+r>o.y-o.h/2 && jy-r<o.y+o.h/2;
    case 'squid':
      if (dist(jx,jy,o.x,o.y) < r + 20) return true;
      for (const c of o.inkClouds) {
        if (dist(jx,jy,c.x,c.y) < r + c.radius) {
          // Ink just obscures vision, doesn't damage
        }
      }
      return false;
    case 'angler':
      if (dist(jx,jy,o.x,o.y) < r + 25) return true;
      if (dist(jx,jy,o.lureX||o.x,o.lureY||o.y) < r + 5) return true;
      return false;
    case 'pressurewave':
      const wd = dist(jx,jy,o.x,o.y);
      if (Math.abs(wd - o.waveRadius) < 10) {
        const angle = Math.atan2(jy-o.y, jx-o.x);
        jelly.vx += Math.cos(angle)*3;
        jelly.vy += Math.sin(angle)*3;
      }
      return false;
    case 'moray': {
      const headY = o.side==='top' ? o.lungeY*2+30 : H-o.lungeY*2-30;
      return o.lunging && dist(jx,jy,o.x,headY) < r+10;
    }
    case 'debris':
      return jx+r>o.x-o.w/2 && jx-r<o.x+o.w/2 && jy+r>o.y-o.h/2 && jy-r<o.y+o.h/2;
    case 'tentaclesweep': {
      const tx = o.x+Math.cos(o.angle)*o.length;
      const ty = o.y+Math.sin(o.angle)*o.length;
      return distToSegment(jx,jy,o.x,o.y,tx,ty) < r + 6;
    }
    case 'vent':
      if (o.active && jx > o.x-20 && jx < o.x+20 && jy > H-350) return true;
      return false;
    case 'mine':
      return dist(jx,jy,o.x,o.y) < r + 15;
    case 'lanternfish':
      return dist(jx,jy,o.x,o.y) < r + 10;
    case 'searchlight': {
      const a = Math.atan2(jy-o.y, jx-o.x);
      const da = angleDiff(a, o.angle);
      const d = dist(jx,jy,o.x,o.y);
      if (d < 400 && Math.abs(da) < 0.08) {
        jelly.stunTimer = 30;
      }
      return false;
    }
    case 'icecrystal':
      return dist(jx,jy,o.x,o.y) < r + o.size/2;
    default: return false;
  }
}

function dist(x1,y1,x2,y2) { return Math.sqrt((x2-x1)**2+(y2-y1)**2); }
function distToSegment(px,py,ax,ay,bx,by) {
  const dx=bx-ax, dy=by-ay, len2=dx*dx+dy*dy;
  if (len2===0) return dist(px,py,ax,ay);
  let t=((px-ax)*dx+(py-ay)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  return dist(px,py,ax+t*dx,ay+t*dy);
}
function angleDiff(a,b) { let d=a-b; while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2; return d; }

// ENVIRONMENT DRAWING
// ============================================================
let bubbles = [];
for (let i=0;i<30;i++) bubbles.push({ x:Math.random()*W*3, y:Math.random()*H, r:1+Math.random()*3, speed:0.3+Math.random()*0.7 });

function drawOceanBg(tier) {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, tierBgTop[tier]);
  grad.addColorStop(1, tierBgBot[tier]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Light rays for shallow tiers
  if (tier <= 1) {
    ctx.globalAlpha = 0.04;
    for (let i=0;i<5;i++) {
      const rx = (i*250 + frameCount*0.3) % (W+200) - 100;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(rx, 0);
      ctx.lineTo(rx+30, 0);
      ctx.lineTo(rx+80+i*20, H);
      ctx.lineTo(rx+50+i*20, H);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawBubbles() {
  ctx.globalAlpha = 0.3;
  bubbles.forEach(b => {
    b.y -= b.speed;
    if (b.y < -10) { b.y = H + 10; b.x = camX + Math.random() * W; }
    const sx = b.x - camX * 0.5;
    ctx.fillStyle = '#B3E5FC';
    ctx.beginPath();
    ctx.arc(sx, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx - b.r*0.3, b.y - b.r*0.3, b.r*0.3, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawSeaFloor() {
  ctx.fillStyle = '#8B7355';
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x=0;x<=W;x+=20) {
    ctx.lineTo(x, H - 15 + Math.sin((x+camX)*0.02)*8);
  }
  ctx.lineTo(W, H);
  ctx.fill();
  ctx.fillStyle = '#C4A35A';
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x=0;x<=W;x+=20) {
    ctx.lineTo(x, H - 8 + Math.sin((x+camX)*0.03)*4);
  }
  ctx.lineTo(W, H);
  ctx.fill();
}

function drawParallaxBg() {
  // Distant coral silhouettes
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#FF6B35';
  for (let i=0;i<8;i++) {
    const bx = ((i*300 - camX*0.2) % (W+400)) - 100;
    const bh = 60 + i*20;
    ctx.beginPath();
    ctx.moveTo(bx, H-10);
    ctx.quadraticCurveTo(bx+15, H-10-bh, bx+30, H-10);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(bx+40, H-10);
    ctx.quadraticCurveTo(bx+50, H-10-bh*0.7, bx+60, H-10);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawExitPortal(x, y) {
  const f = frameCount;
  ctx.save();
  ctx.translate(x, 0);

  // Full-height glowing finish line
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#00E5FF';
  ctx.strokeStyle = '#00E5FF';
  ctx.lineWidth = 4;
  ctx.globalAlpha = 0.4 + Math.sin(f*0.05)*0.15;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, H);
  ctx.stroke();

  // Pulsing glow band
  ctx.fillStyle = '#00E5FF';
  ctx.globalAlpha = 0.08 + Math.sin(f*0.05)*0.04;
  ctx.fillRect(-20, 0, 40, H);

  // Particles rising along the line
  for (let i=0;i<8;i++) {
    const py = H - ((f*1.5 + i*95) % H);
    const px = Math.sin(f*0.03 + i)*12;
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#80DEEA';
    ctx.beginPath();
    ctx.arc(px, py, 3, 0, Math.PI*2);
    ctx.fill();
  }

  // "FINISH" text at center
  ctx.globalAlpha = 0.3 + Math.sin(f*0.04)*0.15;
  ctx.fillStyle = '#00E5FF';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('FINISH', 0, H/2);
  ctx.textAlign = 'left';

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPearl(p) {
  if (p.collected) return;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#FFD700';
  ctx.fillStyle = '#FFF0F5';
  ctx.beginPath();
  ctx.arc(0, 0, 6, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.globalAlpha = 0.5 + Math.sin(frameCount*0.08+p.x)*0.3;
  ctx.beginPath();
  ctx.arc(-2, -2, 2.5, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawHUD() {
  const evo = jelly.getEvo();
  ctx.fillStyle = '#fff';
  ctx.font = '16px monospace';
  ctx.globalAlpha = 0.8;
  ctx.textAlign = 'left';
  ctx.fillText(`Score: ${score}`, 15, 25);
  ctx.textAlign = 'right';
  if (currentLevelData) ctx.fillText(currentLevelData.name, W-15, 25);
  ctx.fillText(`Level ${currentLevel+1}/30`, W-15, 45);
  ctx.textAlign = 'left';

  // Pulse cooldown bar
  if (jelly.pulseCooldown > 0) {
    const pct = jelly.pulseCooldown / evo.pulseCooldown;
    ctx.fillStyle = 'rgba(0,229,255,0.3)';
    ctx.fillRect(15, 35, 80, 8);
    ctx.fillStyle = '#00E5FF';
    ctx.fillRect(15, 35, 80*(1-pct), 8);
  } else {
    ctx.fillStyle = '#00E5FF';
    ctx.fillRect(15, 35, 80, 8);
  }
  ctx.font = '10px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('PULSE', 15, 56);

  // Shield cooldown
  if (evo.shieldUnlocked) {
    if (jelly.shieldActive) {
      ctx.fillStyle = '#E040FB';
      ctx.fillRect(15, 62, 80, 8);
    } else if (jelly.shieldCooldown > 0) {
      const pct = jelly.shieldCooldown / 600;
      ctx.fillStyle = 'rgba(224,64,251,0.3)';
      ctx.fillRect(15, 62, 80, 8);
      ctx.fillStyle = '#E040FB';
      ctx.fillRect(15, 62, 80*(1-pct), 8);
    } else {
      ctx.fillStyle = '#E040FB';
      ctx.fillRect(15, 62, 80, 8);
    }
    ctx.fillStyle = '#fff';
    ctx.fillText('SHIELD', 15, 83);
  }

  // Evolution name
  ctx.font = '12px monospace';
  ctx.fillStyle = evo.color;
  ctx.fillText(evo.name, 15, H-15);
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.3;
  ctx.textAlign = 'right';
  ctx.fillText('ESC: menu', W-15, H-15);
  ctx.textAlign = 'left';

  ctx.globalAlpha = 1;
}

// ============================================================
// GAME SCREENS
// ============================================================
function drawTitle() {
  drawOceanBg(0);
  drawBubbles();
  drawSeaFloor();

  // Title jellyfish
  const evo = evolutions[0];
  drawJellyfish(W/2, H/2 - 30 + Math.sin(frameCount*0.03)*15, evo, 1, frameCount);

  ctx.textAlign = 'center';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#00E5FF';

  ctx.font = 'bold 42px monospace';
  ctx.fillStyle = '#00E5FF';
  ctx.fillText('JELLYFISH', W/2, 160);
  ctx.font = 'bold 36px monospace';
  ctx.fillStyle = '#80DEEA';
  ctx.fillText('Ocean Adventure', W/2, 210);

  ctx.shadowBlur = 0;
  ctx.font = '18px monospace';
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.5 + Math.sin(frameCount*0.05)*0.3;
  ctx.fillText('Press SPACE or Tap to Play', W/2, H - 120);
  ctx.globalAlpha = 0.6;
  ctx.font = '14px monospace';
  ctx.fillText('Press L for Level Select', W/2, H - 90);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawLevelSelect() {
  drawOceanBg(0);
  ctx.textAlign = 'center';
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = '#00E5FF';
  ctx.fillText('Level Select', W/2, 50);

  const cols = 6, rows = 5;
  const cellW = 110, cellH = 100;
  const startX = (W - cols*cellW)/2 + cellW/2;
  const startY = 100;
  const tierColors = ['#0077B6','#023E8A','#1565C0','#4A148C','#B71C1C'];

  for (let i=0;i<30;i++) {
    const col = i%cols, row = Math.floor(i/cols);
    const cx = startX + col*cellW;
    const cy = startY + row*cellH;
    const unlocked = i <= highestLevel;
    const selected = i === levelSelectCursor;

    // Tier label on first column
    if (col === 0) {
      ctx.font = '10px monospace';
      ctx.fillStyle = tierColors[row];
      ctx.globalAlpha = 0.7;
      ctx.textAlign = 'right';
      ctx.fillText(tierNames[row], startX - cellW/2 - 5, cy + 5);
      ctx.textAlign = 'center';
      ctx.globalAlpha = 1;
    }

    // Circle
    ctx.beginPath();
    ctx.arc(cx, cy, 28, 0, Math.PI*2);
    if (selected) {
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 3;
      ctx.stroke();
    }
    if (unlocked) {
      ctx.fillStyle = i < highestLevel ? tierColors[getTier(i)] : 'rgba(255,255,255,0.15)';
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px monospace';
      ctx.fillText(i+1, cx, cy+6);
      if (i < highestLevel) {
        ctx.fillStyle = '#4CAF50';
        ctx.font = '14px monospace';
        ctx.fillText('✓', cx, cy-12);
      }
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '16px monospace';
      ctx.fillText('🔒', cx, cy+6);
    }
  }

  // Selected level name
  ctx.font = '16px monospace';
  ctx.fillStyle = '#80DEEA';
  ctx.fillText(levelDefs[levelSelectCursor].name, W/2, H-50);
  ctx.font = '13px monospace';
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.5;
  ctx.fillText('Arrow keys to navigate, SPACE to select, ESC to go back', W/2, H-25);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#00E5FF';
  ctx.font = 'bold 36px monospace';
  ctx.fillStyle = '#00E5FF';
  ctx.fillText('Level Complete!', W/2, H/2-60);

  ctx.shadowBlur = 0;
  ctx.font = '20px monospace';
  ctx.fillStyle = '#FFD700';
  ctx.fillText(`Score: ${score}`, W/2, H/2-10);

  // Check evolution
  if (evolveTimer > 0) {
    evolveTimer--;
    ctx.font = 'bold 24px monospace';
    ctx.fillStyle = '#E040FB';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#E040FB';
    ctx.fillText(`You evolved to ${evolutions[evolveStage].name}!`, W/2, H/2+40);
    ctx.shadowBlur = 0;
    // Draw new jellyfish
    drawJellyfish(W/2, H/2+110, evolutions[evolveStage], 1, frameCount);
  }

  ctx.font = '14px monospace';
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.6;
  ctx.fillText('Press SPACE to continue', W/2, H/2+170);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 36px monospace';
  ctx.fillStyle = '#FF5252';
  ctx.fillText('Game Over', W/2, H/2-20);
  ctx.font = '18px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(`Level ${currentLevel+1}: ${levelDefs[currentLevel].name}`, W/2, H/2+20);
  ctx.globalAlpha = 0.6;
  ctx.font = '14px monospace';
  ctx.fillText('Press SPACE to retry  |  ESC for title', W/2, H/2+60);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawGameWin() {
  // Sunrise gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#FF6F00');
  grad.addColorStop(0.4, '#FFB300');
  grad.addColorStop(0.7, '#0077B6');
  grad.addColorStop(1, '#023E8A');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  drawBubbles();

  // Confetti bubbles
  for (let i=0;i<20;i++) {
    ctx.fillStyle = ['#FF80AB','#80D8FF','#B9F6CA','#FFD180','#EA80FC'][i%5];
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    const bx = (i*53 + frameCount*0.5) % W;
    const by = (i*71 + frameCount*0.8) % H;
    ctx.arc(bx, by, 4+Math.sin(frameCount*0.05+i)*2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Final jellyfish
  drawJellyfish(W/2, H/2+20, evolutions[5], 1, frameCount);

  ctx.textAlign = 'center';
  ctx.shadowBlur = 15;
  ctx.shadowColor = '#FFD700';
  ctx.font = 'bold 40px monospace';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('You Conquered', W/2, 140);
  ctx.fillText('the Ocean!', W/2, 190);
  ctx.shadowBlur = 0;
  ctx.font = '22px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(`Total Score: ${totalScore}`, W/2, H-100);
  ctx.font = '14px monospace';
  ctx.globalAlpha = 0.6;
  ctx.fillText('Press SPACE to play again', W/2, H-60);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
let prevSpace = false;
let prevL = false;
let prevEsc = false;

function gameLoop() {
  frameCount++;
  const spaceJust = keys['Space'] && !prevSpace;
  const lJust = keys['KeyL'] && !prevL;
  const escJust = keys['Escape'] && !prevEsc;

  ctx.clearRect(0, 0, W, H);

  switch(gameState) {
    case 'title':
      drawTitle();
      if (spaceJust) {
        score = 0;
        loadLevel(highestLevel);
        gameState = 'playing';
      }
      if (lJust) {
        levelSelectCursor = highestLevel;
        gameState = 'levelSelect';
      }
      break;

    case 'levelSelect':
      drawLevelSelect();
      if (keys['ArrowRight'] && !prevRight) levelSelectCursor = Math.min(29, levelSelectCursor+1);
      if (keys['ArrowLeft'] && !prevLeft) levelSelectCursor = Math.max(0, levelSelectCursor-1);
      if (keys['ArrowDown'] && !prevDown) levelSelectCursor = Math.min(29, levelSelectCursor+6);
      if (keys['ArrowUp'] && !prevUp) levelSelectCursor = Math.max(0, levelSelectCursor-6);
      if (spaceJust && levelSelectCursor <= highestLevel) {
        score = 0;
        loadLevel(levelSelectCursor);
        gameState = 'playing';
      }
      if (escJust) gameState = 'title';
      break;

    case 'playing': {
      if (!currentLevelData) break;
      const tier = getTier(currentLevel);
      const ld = currentLevelData;

      // Update
      jelly.update();

      // Camera
      const targetCamX = jelly.x - W*0.35;
      camX += (targetCamX - camX) * 0.08;
      camX = Math.max(0, Math.min(ld.worldWidth - W, camX));

      // Screen shake
      let sx = 0, sy = 0;
      if (shakeTimer > 0) {
        shakeTimer--;
        sx = (Math.random()-0.5) * shakeTimer;
        sy = (Math.random()-0.5) * shakeTimer;
      }
      ctx.save();
      ctx.translate(sx, sy);

      // Draw
      drawOceanBg(tier);
      drawParallaxBg();
      drawBubbles();
      drawSeaFloor();

      ctx.save();
      ctx.translate(-camX, 0);

      // Obstacles
      ld.obstacles.forEach(o => { updateObstacle(o); drawObstacle(o); });

      // Collisions
      ld.obstacles.forEach(o => {
        if (o.stunTimer > 0) return;
        if (checkCollision(o)) {
          if (jelly.takeDamage()) {
            gameState = 'gameOver';
            levelTimer = 0;
          }
        }
      });

      // Pearls
      ld.pearls.forEach(p => {
        drawPearl(p);
        if (!p.collected && dist(jelly.x, jelly.y, p.x, p.y) < jelly.getEvo().radius + 8) {
          p.collected = true;
          score += 10;
          if (audioCtx) sfxPearl();
        }
      });

      // Exit portal
      drawExitPortal(ld.exitX, ld.exitY);

      // Check exit — trigger when past the exit X position (full-height goal line)
      if (jelly.x >= ld.exitX - 40) {
        completeLevel();
      }

      // Draw jellyfish
      const evo = jelly.getEvo();
      if (jelly.invincTimer > 0 && jelly.invincTimer % 4 < 2) {
        // Flash when invincible
      } else {
        drawJellyfish(jelly.x, jelly.y, evo, jelly.facing, frameCount);
      }

      // Shield visual
      if (jelly.shieldActive) {
        ctx.globalAlpha = 0.25 + Math.sin(frameCount*0.1)*0.1;
        ctx.strokeStyle = '#E040FB';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#E040FB';
        ctx.beginPath();
        ctx.arc(jelly.x, jelly.y, evo.radius + 15, 0, Math.PI*2);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }

      ctx.restore(); // un-translate camX
      ctx.restore(); // un-translate shake

      drawHUD();

      // Escape to quit to title
      if (escJust) {
        score = 0;
        gameState = 'title';
      }
      break;
    }

    case 'levelComplete':
      // Keep drawing the level behind
      if (currentLevelData) {
        const tier = getTier(currentLevel);
        drawOceanBg(tier);
        drawBubbles();
        drawSeaFloor();
      }
      drawLevelComplete();
      levelTimer++;
      if (levelTimer > 120) {
        // Auto-advance after 2 seconds, or press Space to skip
        if (currentLevel >= 29) {
          gameState = 'gameWin';
        } else {
          loadLevel(currentLevel + 1);
          gameState = 'playing';
        }
      } else if (spaceJust && levelTimer > 30) {
        if (currentLevel >= 29) {
          gameState = 'gameWin';
        } else {
          loadLevel(currentLevel + 1);
          gameState = 'playing';
        }
      }
      break;

    case 'gameOver':
      if (currentLevelData) {
        const tier = getTier(currentLevel);
        drawOceanBg(tier);
        drawBubbles();
        drawSeaFloor();
      }
      drawGameOver();
      if (spaceJust) {
        loadLevel(currentLevel);
        gameState = 'playing';
      }
      if (escJust) {
        score = 0;
        gameState = 'title';
      }
      break;

    case 'gameWin':
      drawGameWin();
      if (spaceJust) {
        highestLevel = 0;
        totalScore = 0;
        saveProgress();
        gameState = 'title';
      }
      break;
  }

  prevSpace = keys['Space'];
  prevL = keys['KeyL'];
  prevEsc = keys['Escape'];
  prevRight = keys['ArrowRight'];
  prevLeft = keys['ArrowLeft'];
  prevDown = keys['ArrowDown'];
  prevUp = keys['ArrowUp'];

  requestAnimationFrame(gameLoop);
}

function completeLevel() {
  totalScore += score;
  gameState = 'levelComplete';
  levelTimer = 0;
  evolveTimer = 0;
  evolveStage = -1;

  if (currentLevel >= highestLevel) {
    highestLevel = currentLevel + 1;
    saveProgress();
  }

  // Check for evolution
  const prevStage = getEvolutionStage(currentLevel);
  const nextStage = getEvolutionStage(currentLevel + 1);
  if (nextStage > prevStage && currentLevel < 29) {
    evolveTimer = 180;
    evolveStage = nextStage;
    if (audioCtx) sfxEvolve();
  }
}

let prevRight = false, prevLeft = false, prevDown = false, prevUp = false;

// Start!
gameLoop();
</script>
